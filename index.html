<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<!-- Makes page responsive on all devices -->
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Marksheet</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#6bd7fe;
}

/* Limits width on large screens */
.main-box{
max-width:100%;
margin:auto;
}
</style>

</head>

<body>

<div class="container mt-4">

<div class="main-box">

<h2 class="text-center mb-4">Student Result System</h2>

<div class="card mb-4">
<div class="card-body">

<label class="form-label"><b>Enter Seat Number</b></label>

<input type="text" id="seatno" class="form-control" placeholder="Enter Seat Number">

<br>

<button class="btn btn-primary w-100" onclick="showResult()">Submit</button>

</div>
</div>


<div id="resultSection" style="display:none;">

<div class="card mb-3">

<div class="card-header bg-primary text-white">
Student Personal Details
</div>

<div class="card-body">

<p><b>Name:</b> Yogita Chug</p>
<p><b>Seat No:</b> <span id="displaySeat"></span></p>
<p><b>Class:</b> SY BSC(CS)</p>
<p><b>College:</b> ST. MIRA'S COLLEGE FOR GIRLS-PUNE</p>

</div>
</div>


<div class="card">

<div class="card-header bg-success text-white">
Marksheet
</div>

<div class="card-body">

<div class="table-responsive">

<table class="table table-bordered text-center">

<thead class="table-dark">
<tr>
<th>Subject</th>
<th>Marks</th>
<th>Total</th>
</tr>
</thead>

<tbody>

<tr>
<td>DBMS</td>
<td>98</td>
<td>100</td>
</tr>

<tr>
<td>HTML</td>
<td>95</td>
<td>100</td>
</tr>

<tr>
<td>Python</td>
<td>92</td>
<td>100</td>
</tr>

<tr>
<td>Data Structures</td>
<td>94</td>
<td>100</td>
</tr>

<tr>
<td>Maths</td>
<td>98</td>
<td>100</td>
</tr>

</tbody>

</table>

</div>

<h5>Percentage: <b>94.3%</b></h5>
<h5>SGPA: <b>9.4</b></h5>

<h5>Result:
<mark class="bg-success text-white p-1">PASS</mark>
</h5>

</div>

</div>

</div>

</div>
</div>


<script>

function showResult(){

let seat = document.getElementById("seatno").value;

if(seat==""){
alert("Please enter Seat Number");
return;
}

document.getElementById("displaySeat").innerText = seat;

document.getElementById("resultSection").style.display="block";

}

</script>

</body>
</html>
